# Render.com Blueprint for dufour.app
# Complete deployment configuration

services:
  # Backend API + QGIS Server (Embedded in same container)
  - type: web
    name: dufour-api
    runtime: docker
    dockerfilePath: ./backend/api/Dockerfile
    repo: https://github.com/intelligeo/dufour-app
    branch: main
    region: frankfurt
    plan: starter  # QGIS Server richiede più memoria (512MB minimum)
    envVars:
      - key: POSTGIS_HOST
        value: postgresql-intelligeo.alwaysdata.net
      - key: POSTGIS_PORT
        value: "5432"
      - key: POSTGIS_DB
        value: intelligeo_dufour
      - key: POSTGIS_USER
        value: intelligeo_dufour
      - key: POSTGIS_PASSWORD
        sync: false  # Configure manually in Render dashboard
      - key: QGIS_SERVER_URL
        value: http://localhost:8080  # QGIS Server embedded on port 8080
      - key: LOG_LEVEL
        value: INFO
      - key: QGIS_SERVER_LOG_LEVEL
        value: "1"  # 0=INFO, 1=WARNING, 2=CRITICAL
      - key: QGIS_SERVER_PARALLEL_RENDERING
        value: "1"
      - key: QGIS_SERVER_MAX_THREADS
        value: "2"
      - key: QGIS_SERVER_IGNORE_BAD_LAYERS
        value: "1"
      # Milsymbol Server configuration (embedded sidecar)
      - key: MILSYMBOL_SERVER_URL
        value: http://localhost:2525
      - key: MILSYMBOL_PORT
        value: "2525"
      - key: MILSYMBOL_DEFAULT_SIZE
        value: "100"
      - key: DEFAULT_SIDC_FORMAT
        value: APP-6D
      - key: SYMBOL_CACHE_SIZE
        value: "512"
      # Render.com routes traffic to this port — FastAPI must listen here
      - key: PORT
        value: "10000"
    healthCheckPath: /
    autoDeploy: true

  # Frontend Web Service (QWC2 + Webpack)
  - type: web
    name: dufour-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    repo: https://github.com/intelligeo/dufour-app
    branch: main
    region: frankfurt
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
    healthCheckPath: /
    autoDeploy: true

# Architecture Notes:
# - Backend API + QGIS Server embedded in single container (Port 10000 + 8080)
# - QGIS projects stored in PostgreSQL BYTEA column (max 50MB per project)
# - Frontend: QWC2 (QGIS Web Client 2) built with Webpack, served via Nginx
# - /themes.json proxied from nginx to backend (dynamic theme generation)
# - Database: PostgreSQL 16 + PostGIS at alwaysdata.net
# - Cold start time: ~30s for backend (acceptable for free tier)

# Deployment Instructions:
# 1. Push code to GitHub repository
# 2. Create Render account and connect GitHub repo
# 3. Import render.yaml blueprint
# 4. Set POSTGIS_PASSWORD secret in Render dashboard
# 5. Deploy all services
# 6. Access frontend at https://dufour-app.onrender.com

