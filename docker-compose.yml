version: '3.8'

services:
  # PostgreSQL with PostGIS
  postgis:
    image: postgis/postgis:15-3.4-alpine
    container_name: dufour-postgis
    environment:
      POSTGRES_DB: gisdb
      POSTGRES_USER: gisuser
      POSTGRES_PASSWORD: gispassword
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgis-data:/var/lib/postgresql/data
      - ./postgis/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gisuser -d gisdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dufour-network

  # QGIS Server
  qgis-server:
    image: openquake/qgis-server:stable
    container_name: dufour-qgis
    environment:
      QGIS_SERVER_LOG_LEVEL: 0
      QGIS_SERVER_LOG_STDERR: 1
      QGIS_PROJECT_FILE: /data/projects/dufour.qgs
      PGSERVICEFILE: /data/pg_service.conf
      QGIS_SERVER_PARALLEL_RENDERING: 1
      MAX_CACHE_LAYERS: 100
      # Enable CORS for development
      QGIS_SERVER_ALLOWED_ORIGINS: "*"
    ports:
      - "8080:80"
    volumes:
      - ./qgis-server/projects:/data/projects
      - ./qgis-server/plugins:/usr/share/qgis/python/plugins
      - ./qgis-server/pg_service.conf:/data/pg_service.conf
    depends_on:
      postgis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/cgi-bin/qgis_mapserv.fcgi?SERVICE=WMS&REQUEST=GetCapabilities"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - dufour-network

  # Frontend Development Server (for development only)
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: dufour-frontend-dev
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:8080
      VITE_POSTGIS_URL: http://localhost:5432
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - dufour-network

  # Nginx (for production builds)
  nginx:
    image: nginx:alpine
    container_name: dufour-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - qgis-server
    profiles:
      - production
    networks:
      - dufour-network

volumes:
  postgis-data:
    driver: local

networks:
  dufour-network:
    driver: bridge
